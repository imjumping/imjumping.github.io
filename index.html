<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>都给我安静！</title>
    <meta name="description" content="持续安静一段时间种一棵植物 多棵植物会长成更大的植物">
    <meta name="keywords" content="课堂安静种树游戏, 种树游戏, 课堂游戏">
    <meta name="author" content="imjumping">

    <style>
        /* 基础样式 ———— 完全保留原样，未改动任何视觉 */
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 20px;
            transition: all 0.5s ease;
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        .forest-bg {
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
        }
        .space-bg {
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            color: #ffffff;
        }
        .ocean-bg {
            background: linear-gradient(135deg, #1a6f8b 0%, #1e3c72 50%, #2a5298 100%);
            color: #ffffff;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .space-bg .container, .ocean-bg .container {
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        h1 {
            color: #2e8b57;
            margin-top: 0;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.1);
            background: linear-gradient(45deg, #2e8b57, #32cd32);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .space-bg h1 {
            background: linear-gradient(45deg, #4fc3f7, #2979ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .ocean-bg h1 {
            background: linear-gradient(45deg, #4dd0e1, #00acc1);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 30px;
        }

        .space-bg .subtitle, .ocean-bg .subtitle {
            color: #ccc;
        }

        .scene-container {
            min-height: 350px;
            border: 2px dashed rgba(0, 0, 0, 0.1);
            border-radius: 15px;
            margin: 25px 0;
            padding: 25px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: flex-end;
            position: relative;
            overflow: hidden;
            background: rgba(255, 255, 255, 0.5);
            transition: all 0.3s ease;
        }

        .forest-scene {
            background: linear-gradient(to bottom, #e6f3ff, #cce7ff);
            border-color: #4CAF50;
        }

        .space-scene {
            background: linear-gradient(to bottom, #000033, #1a0033);
            border-color: #4fc3f7;
        }

        .ocean-scene {
            background: linear-gradient(to bottom, #0077be, #005689);
            border-color: #4dd0e1;
        }

        .tree {
            font-size: 40px;
            margin: 15px;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            z-index: 2;
            filter: drop-shadow(0 4px 6px rgba(0, 0, 0, 0.1));
        }

        .sapling {
            font-size: 25px;
            opacity: 0.8;
        }

        .controls {
            margin: 25px 0;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 12px;
        }

        button {
            background: linear-gradient(145deg, #4CAF50, #45a049);
            color: white;
            border: none;
            padding: 12px 24px;
            text-align: center;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            border-radius: 50px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(76, 175, 80, 0.2);
            position: relative;
            overflow: hidden;
        }

        button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: 0.5s;
        }

        button:hover::before {
            left: 100%;
        }

        .space-bg button {
            background: linear-gradient(145deg, #3f51b5, #303f9f);
            box-shadow: 0 4px 15px rgba(63, 81, 181, 0.3);
        }

        .ocean-bg button {
            background: linear-gradient(145deg, #00897b, #00695c);
            box-shadow: 0 4px 15px rgba(0, 137, 123, 0.3);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(76, 175, 80, 0.3);
        }

        .space-bg button:hover {
            box-shadow: 0 8px 25px rgba(63, 81, 181, 0.4);
        }

        .ocean-bg button:hover {
            box-shadow: 0 8px 25px rgba(0, 137, 123, 0.4);
        }

        button:active {
            transform: translateY(-1px);
        }

        button:disabled {
            background: linear-gradient(145deg, #cccccc, #b3b3b3);
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        button:disabled:hover::before {
            left: -100%;
        }

        .mode-buttons {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 15px 0;
        }

        .mode-btn {
            padding: 10px 20px;
            border-radius: 25px;
            font-size: 14px;
            flex: 1;
            max-width: 200px;
        }

        .mode-btn.active {
            box-shadow: 0 0 0 2px white, 0 0 0 4px currentColor;
        }

        .progress-container {
            width: 100%;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            margin: 25px 0;
            overflow: hidden;
            height: 25px;
            position: relative;
        }

        .space-bg .progress-container, .ocean-bg .progress-container {
            background: rgba(255, 255, 255, 0.1);
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #4CAF50, #8BC34A);
            border-radius: 10px;
            width: 0%;
            transition: width 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            overflow: hidden;
        }

        .progress-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            bottom: 0;
            right: 0;
            background: linear-gradient(90deg,
                transparent 0%,
                rgba(255, 255, 255, 0.3) 50%,
                transparent 100%);
            animation: shimmer 2s infinite;
        }

        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        .space-bg .progress-bar {
            background: linear-gradient(90deg, #4fc3f7, #2979ff);
        }

        .ocean-bg .progress-bar {
            background: linear-gradient(90deg, #4dd0e1, #00acc1);
        }

        .progress-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-weight: bold;
            color: #333;
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.5);
        }

        .space-bg .progress-text, .ocean-bg .progress-text {
            color: white;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.5);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin: 25px 0;
        }

        .stat-box {
            background: linear-gradient(145deg, #ffffff, #f0f0f0);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
            transition: all 0.3s ease;
            border: 1px solid rgba(255, 255, 255, 0.5);
        }

        .stat-box:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.1);
        }

        .space-bg .stat-box {
            background: linear-gradient(145deg, #1a237e, #283593);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .ocean-bg .stat-box {
            background: linear-gradient(145deg, #00695c, #004d40);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .stat-box > div:first-child {
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .space-bg .stat-box > div:first-child,
        .ocean-bg .stat-box > div:first-child {
            color: #ccc;
        }

        .stat-box > div:last-child {
            font-size: 28px;
            font-weight: bold;
            color: #2e8b57;
        }

        .space-bg .stat-box > div:last-child {
            color: #4fc3f7;
        }

        .ocean-bg .stat-box > div:last-child {
            color: #4dd0e1;
        }

        .noise-level-container {
            margin: 25px 0;
            padding: 20px;
            background: rgba(255, 255, 255, 0.8);
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.05);
        }

        .space-bg .noise-level-container,
        .ocean-bg .noise-level-container {
            background: rgba(255, 255, 255, 0.1);
        }

        .noise-level {
            font-size: 18px;
            margin-bottom: 10px;
        }

        .noise-visualizer {
            width: 100%;
            height: 50px;
            background: linear-gradient(90deg, #4CAF50, #FFC107, #F44336);
            border-radius: 10px;
            margin: 15px 0;
            overflow: hidden;
            position: relative;
        }

        .noise-indicator {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 3px;
            background: white;
            box-shadow: 0 0 10px white;
            transform: translateX(-50%);
            transition: left 0.1s ease;
        }

        .noise-threshold {
            position: absolute;
            top: 0;
            bottom: 0;
            width: 2px;
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
        }

        .settings-panel, .achievements-panel {
            display: none;
            margin: 25px 0;
            padding: 25px;
            background: linear-gradient(145deg, #ffffff, #f8f9fa);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .space-bg .settings-panel,
        .space-bg .achievements-panel,
        .ocean-bg .settings-panel,
        .ocean-bg .achievements-panel {
            background: linear-gradient(145deg, rgba(0, 0, 0, 0.3), rgba(0, 0, 0, 0.4));
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid rgba(0, 0, 0, 0.05);
        }

        .space-bg .panel-header,
        .ocean-bg .panel-header {
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        .panel-header h3 {
            margin: 0;
            font-size: 1.5em;
            color: #333;
        }

        .space-bg .panel-header h3,
        .ocean-bg .panel-header h3 {
            color: white;
        }

        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .setting-item {
            background: rgba(255, 255, 255, 0.5);
            padding: 20px;
            border-radius: 15px;
            transition: all 0.3s ease;
        }

        .setting-item:hover {
            background: rgba(255, 255, 255, 0.7);
            transform: translateY(-2px);
        }

        .space-bg .setting-item,
        .ocean-bg .setting-item {
            background: rgba(255, 255, 255, 0.05);
        }

        .space-bg .setting-item:hover,
        .ocean-bg .setting-item:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .setting-label {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
            font-weight: 600;
            color: #333;
        }

        .space-bg .setting-label,
        .ocean-bg .setting-label {
            color: white;
        }

        .setting-value {
            font-weight: bold;
            color: #4CAF50;
            font-size: 1.2em;
        }

        .space-bg .setting-value {
            color: #4fc3f7;
        }

        .ocean-bg .setting-value {
            color: #4dd0e1;
        }

        input[type="range"] {
            width: 100%;
            height: 10px;
            -webkit-appearance: none;
            background: rgba(0, 0, 0, 0.1);
            border-radius: 5px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: linear-gradient(145deg, #4CAF50, #45a049);
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            border: 3px solid white;
        }

        .space-bg input[type="range"]::-webkit-slider-thumb {
            background: linear-gradient(145deg, #4fc3f7, #2979ff);
        }

        .ocean-bg input[type="range"]::-webkit-slider-thumb {
            background: linear-gradient(145deg, #4dd0e1, #00acc1);
        }

        input[type="number"] {
            width: 80px;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            text-align: center;
            transition: all 0.3s ease;
        }

        input[type="number"]:focus {
            outline: none;
            border-color: #4CAF50;
            box-shadow: 0 0 0 3px rgba(76, 175, 80, 0.1);
        }

        .space-bg input[type="number"]:focus {
            border-color: #4fc3f7;
            box-shadow: 0 0 0 3px rgba(79, 195, 247, 0.1);
        }

        .ocean-bg input[type="number"]:focus {
            border-color: #4dd0e1;
            box-shadow: 0 0 0 3px rgba(77, 208, 225, 0.1);
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }

        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }

        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 26px;
            width: 26px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider {
            background: linear-gradient(145deg, #4CAF50, #45a049);
        }

        input:checked + .slider:before {
            transform: translateX(26px);
        }

        .space-bg input:checked + .slider {
            background: linear-gradient(145deg, #4fc3f7, #2979ff);
        }

        .ocean-bg input:checked + .slider {
            background: linear-gradient(145deg, #4dd0e1, #00acc1);
        }

        .achievements-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 15px;
        }

        .achievement {
            background: linear-gradient(145deg, #ffffff, #f0f0f0);
            padding: 20px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .achievement.unlocked {
            border-color: #4CAF50;
            background: linear-gradient(145deg, #e8f5e9, #c8e6c9);
        }

        .achievement.locked {
            opacity: 0.7;
            filter: grayscale(0.5);
        }

        .space-bg .achievement {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.1));
        }

        .space-bg .achievement.unlocked {
            border-color: #4fc3f7;
            background: linear-gradient(145deg, rgba(79, 195, 247, 0.2), rgba(79, 195, 247, 0.3));
        }

        .ocean-bg .achievement {
            background: linear-gradient(145deg, rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.1));
        }

        .ocean-bg .achievement.unlocked {
            border-color: #4dd0e1;
            background: linear-gradient(145deg, rgba(77, 208, 225, 0.2), rgba(77, 208, 225, 0.3));
        }

        .achievement-icon {
            font-size: 40px;
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: rgba(76, 175, 80, 0.1);
            flex-shrink: 0;
        }

        .achievement.unlocked .achievement-icon {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.1); }
            100% { transform: scale(1); }
        }

        .achievement-info {
            flex: 1;
            text-align: left;
        }

        .achievement-title {
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 5px;
            color: #333;
        }

        .space-bg .achievement-title,
        .ocean-bg .achievement-title {
            color: white;
        }

        .achievement-description {
            font-size: 14px;
            color: #666;
            margin-bottom: 5px;
        }

        .space-bg .achievement-description,
        .ocean-bg .achievement-description {
            color: #ccc;
        }

        .achievement-date {
            font-size: 12px;
            color: #999;
        }

        .scene-selector {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .scene-btn {
            padding: 12px 24px;
            border: 2px solid transparent;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
	    color: #333
        }

        .scene-btn.active {
            border-color: currentColor;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
            transform: translateY(-2px);
        }

        .notification {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: linear-gradient(145deg, #4CAF50, #45a049);
            color: white;
            padding: 20px 30px;
            border-radius: 50px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            z-index: 1000;
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            max-width: 80%;
            text-align: center;
            font-weight: 600;
        }

        .notification.show {
            transform: translateX(-50%) translateY(0);
            opacity: 1;
        }

        .space-bg .notification {
            background: linear-gradient(145deg, #3f51b5, #303f9f);
        }

        .ocean-bg .notification {
            background: linear-gradient(145deg, #00897b, #00695c);
        }

        @media (max-width: 768px) {
            .container { padding: 15px; }
            .controls { flex-direction: column; }
            .mode-buttons { flex-direction: column; }
            .mode-btn { max-width: 100%; }
            .scene-selector { flex-direction: column; }
            .scene-btn { width: 100%; }
            .settings-grid { grid-template-columns: 1fr; }
            .achievements-grid { grid-template-columns: 1fr; }
            .stats { grid-template-columns: repeat(2, 1fr); }
        }

        @media (max-width: 480px) {
            .stats { grid-template-columns: 1fr; }
            h1 { font-size: 2em; }
            .container { padding: 10px; }
        }

        .confetti {
            position: absolute;
            width: 15px;
            height: 15px;
            border-radius: 50%;
            animation: fall 3s linear forwards;
            z-index: 1;
            filter: drop-shadow(0 0 10px currentColor);
        }

        @keyframes fall {
            0% { transform: translateY(-100px) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }

        .star {
            position: absolute;
            width: 3px;
            height: 3px;
            background-color: white;
            border-radius: 50%;
            animation: twinkle 2s infinite alternate;
            filter: drop-shadow(0 0 5px white);
        }

        @keyframes twinkle {
            from { opacity: 0.2; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1.2); }
        }

        .bubble {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.8), rgba(255,255,255,0.1));
            animation: float-up 5s infinite;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.5));
        }

        @keyframes float-up {
            0% { transform: translateY(0) scale(0); opacity: 0; }
            10% { opacity: 1; transform: translateY(0) scale(1); }
            90% { opacity: 1; }
            100% { transform: translateY(-100px) scale(0); opacity: 0; }
        }

        .leaf {
            position: absolute;
            font-size: 20px;
            animation: float 3s ease-in-out infinite;
            opacity: 0;
            z-index: 1;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.2));
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-100px) rotate(720deg); }
        }

        .sparkle {
            position: absolute;
            width: 8px;
            height: 8px;
            background: radial-gradient(circle, gold, transparent);
            border-radius: 50%;
            animation: sparkle 1s ease-out forwards;
            z-index: 3;
            filter: drop-shadow(0 0 10px gold);
        }

        @keyframes sparkle {
            0% { transform: scale(0) rotate(0deg); opacity: 0; }
            50% { transform: scale(1.5) rotate(180deg); opacity: 1; }
            100% { transform: scale(0) rotate(360deg); opacity: 0; }
        }

        .rocket {
            animation: launch 3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
            filter: drop-shadow(0 0 20px orange);
        }

        @keyframes launch {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(-100px, -500px) scale(0); opacity: 0; }
        }

        .history-chart {
            width: 100%;
            height: 200px;
            margin: 30px 0;
            padding: 20px;
            background: rgba(255, 255, 255, 0.0);
            border-radius: 15px;
            position: relative;
        }

        .space-bg .history-chart,
        .ocean-bg .history-chart {
            background: rgba(255, 255, 255, 0.1);
        }

        .chart-bar {
            position: absolute;
            bottom: 40px;
            width: 40px;
            background: linear-gradient(to top, #4CAF50, #8BC34A);
            border-radius: 10px 10px 0 0;
            transition: height 0.5s ease;
            box-shadow: 0 -5px 15px rgba(76, 175, 80, 0.3);
        }

        .space-bg .chart-bar {
            background: linear-gradient(to top, #4fc3f7, #2979ff);
            box-shadow: 0 -5px 15px rgba(79, 195, 247, 0.3);
        }

        .ocean-bg .chart-bar {
            background: linear-gradient(to top, #4dd0e1, #00acc1);
            box-shadow: 0 -5px 15px rgba(77, 208, 225, 0.3);
        }

        .chart-label {
            position: absolute;
            bottom: 10px;
            left: 0;
            width: 100%;
            text-align: center;
            font-size: 12px;
            font-weight: bold;
        }

        .star-bg, .bubble-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .mode-indicator {
            display: inline-block;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: bold;
            margin-left: 10px;
            background: #4CAF50;
            color: white;
        }

        .space-bg .mode-indicator {
            background: #4fc3f7;
        }

        .ocean-bg .mode-indicator {
            background: #4dd0e1;
        }

        .mode-indicator.reading {
            background: #FF9800;
        }

        .space-bg .mode-indicator.reading {
            background: #FF9800;
        }

        .ocean-bg .mode-indicator.reading {
            background: #FF9800;
        }
    </style>
</head>
<body class="forest-bg">
    <!-- 星空背景（太空场景） -->
    <div class="star-bg" id="starBg" style="display: none;"></div>

    <!-- 泡泡背景（海洋场景） -->
    <div class="bubble-bg" id="bubbleBg" style="display: none;"></div>

    <!-- 通知 -->
    <div class="notification" id="notification"></div>

    <div class="container">
        <h1>课堂安静种树游戏</h1>
        <p class="subtitle">当教室安静时，植物会自动生长。</p>

        <div class="scene-selector">
            <button class="scene-btn active" data-scene="forest">🌲 森林场景</button>
            <button class="scene-btn" data-scene="space">🚀 太空场景</button>
            <button class="scene-btn" data-scene="ocean">🌊 海洋场景</button>
        </div>

        <div class="mode-buttons">
            <button class="mode-btn active" data-mode="quiet">安静模式 <span class="mode-indicator">安静加分</span></button>
            <button class="mode-btn" data-mode="reading">早读模式 <span class="mode-indicator reading">大声叫唤吧！</span></button>
        </div>

        <div class="controls">
            <button id="micBtn">🎤 请求麦克风权限</button>
            <button id="startBtn" disabled>启动！</button>
            <button id="stopBtn" disabled>不启动！</button>
            <button id="resetBtn">清除成绩</button>
            <button class="panel-toggle" id="settingsToggle">⚙️ 设置</button>
            <button class="panel-toggle" id="achievementsToggle">🏆 成就</button>
        </div>

        <div class="noise-level-container">
            <div class="noise-level">
                当前噪音水平: <span id="noiseLevel">0</span>
                <span id="modeText" style="margin-left: 10px; font-weight: bold;">(安静模式)</span>
            </div>
            <div class="noise-visualizer">
                <div class="noise-indicator" id="noiseIndicator"></div>
                <div class="noise-threshold" id="noiseThreshold"></div>
            </div>
            <div class="progress-container">
                <div class="progress-bar" id="progressBar">
                    <div class="progress-text" id="progressText">0%</div>
                </div>
            </div>
        </div>

        <div class="stats">
            <div class="stat-box">
                <div>小植物数量</div>
                <div id="saplingCount">0</div>
            </div>
            <div class="stat-box">
                <div>大植物数量</div>
                <div id="treeCount">0</div>
            </div>
            <div class="stat-box">
                <div>连续安静时间</div>
                <div id="quietTime">0.0秒</div>
            </div>
            <div class="stat-box">
                <div>今日种植总数</div>
                <div id="todayCount">0</div>
            </div>
        </div>

        <div class="scene-container forest-scene" id="sceneContainer"></div>

        <div class="settings-panel" id="settingsPanel">
            <div class="panel-header">
                <h3>⚙️ 游戏设置</h3>
                <button onclick="togglePanel('settings')" style="background: transparent; color: #666; padding: 5px; box-shadow: none;">✕</button>
            </div>
            <div class="settings-grid">
                <div class="setting-item">
                    <div class="setting-label">
                        <span>安静阈值</span>
                        <span class="setting-value" id="thresholdValue">30</span>
                    </div>
                    <input type="range" id="threshold" min="0" max="100" value="30">
                    <div style="font-size: 12px; color: #666; margin-top: 8px;">低于此值视为安静（安静模式）</div>
                </div>

                <div class="setting-item">
                    <div class="setting-label">
                        <span>早读阈值</span>
                        <span class="setting-value" id="readingThresholdValue">50</span>
                    </div>
                    <input type="range" id="readingThreshold" min="0" max="100" value="50">
                    <div style="font-size: 12px; color: #666; margin-top: 8px;">高于此值开始加分（低于阈值直接归零）</div>
                </div>

                <div class="setting-item">
                    <div class="setting-label">
                        <span>植物生长时间</span>
                        <span class="setting-value" id="saplingTimeValue">5</span>
                    </div>
                    <input type="number" id="saplingTime" min="1" max="60" value="5" style="width: 100%;">秒
                </div>

                <div class="setting-item">
                    <div class="setting-label">
                        <span>小植物合并数量</span>
                        <span class="setting-value" id="saplingsPerTreeValue">10</span>
                    </div>
                    <input type="number" id="saplingsPerTree" min="2" max="20" value="10" style="width: 100%;">
                </div>

                <!-- 缓降相关滑块已被移除：早读缓降速度不再使用 -->

                <div class="setting-item" style="grid-column: 1 / -1;">
                    <div class="setting-label">
                        <span>启用音效</span>
                        <label class="switch">
                            <input type="checkbox" id="enableSounds" checked>
                            <span class="slider"></span>
                        </label>
                    </div>
                </div>
            </div>
        </div>

        <div class="achievements-panel" id="achievementsPanel">
            <div class="panel-header">
                <h3>🏆 成就系统</h3>
                <button onclick="togglePanel('achievements')" style="background: transparent; color: #666; padding: 5px; box-shadow: none;">✕</button>
            </div>
            <div class="achievements-grid" id="achievementsList">
                <!-- 成就列表将由JavaScript动态生成 -->
            </div>
        </div>

        <div class="history-chart" id="historyChart">
            <h3 style="margin-top: 0;">历史记录 (最近7天)</h3>
        </div>
    </div>

    <script>
        // 游戏状态
        let isRunning = false;
        let audioContext;
        let analyser;
        let microphone;
        let scriptProcessor;
        let quietStartTime = null;
        let readingStartTime = null;
        let saplings = 0;
        let trees = 0;
        let totalQuietTime = 0;
        let todayCount = 0;
        let historyData = [];
        let currentScene = 'forest';
        let achievements = {};
        let longestQuietTime = 0;
        let todayTrees = 0;
        let currentMode = 'quiet'; // 'quiet' 或 'reading'

        // 移除所有与缓降相关的变量：readingProgress, readingDecayInterval

        // 游戏设置 (去掉了decayRate)
        let settings = {
            threshold: 30,
            readingThreshold: 50,
            saplingTime: 5,
            saplingsPerTree: 10,
            enableSounds: true
            // decayRate 已移除
        };

        // 场景配置
        const scenes = {
            forest: {
                name: '森林',
                smallItem: '🌱',
                bigItem: '🌳',
                bgClass: 'forest-bg',
                sceneClass: 'forest-scene',
                progressColor: '#4CAF50',
                buttonColor: '#4CAF50',
                effects: {
                    createParticles: (parent) => {
                        for (let i = 0; i < 3; i++) {
                            createSparkle(parent);
                        }
                    },
                    createBigEffect: (parent) => {
                        for (let i = 0; i < 10; i++) {
                            createLeaf(parent);
                        }
                    }
                }
            },
            space: {
                name: '太空',
                smallItem: '🛰️',
                bigItem: '🪐',
                bgClass: 'space-bg',
                sceneClass: 'space-scene',
                progressColor: '#4fc3f7',
                buttonColor: '#3f51b5',
                effects: {
                    createParticles: (parent) => {
                        for (let i = 0; i < 5; i++) {
                            createStar(parent);
                        }
                    },
                    createBigEffect: (parent) => {
                        createRocket(parent);
                    }
                }
            },
            ocean: {
                name: '海洋',
                smallItem: '🐠',
                bigItem: '🐋',
                bgClass: 'ocean-bg',
                sceneClass: 'ocean-scene',
                progressColor: '#4dd0e1',
                buttonColor: '#00897b',
                effects: {
                    createParticles: (parent) => {
                        for (let i = 0; i < 3; i++) {
                            createBubble(parent);
                        }
                    },
                    createBigEffect: (parent) => {
                        for (let i = 0; i < 15; i++) {
                            createBubble(parent);
                        }
                    }
                }
            }
        };

        // 成就配置
        const achievementConfig = [
            { id: 'first_sapling', icon: '🌱', title: '第一棵植物', description: '种下第一棵小植物', condition: (game) => game.saplings + game.trees * settings.saplingsPerTree >= 1 },
            { id: 'first_tree', icon: '🌳', title: '第一棵大树', description: '种下第一棵大植物', condition: (game) => game.trees >= 1 },
            { id: 'quiet_5_min', icon: '⏱️', title: '安静5分钟', description: '累计安静时间达到5分钟', condition: (game) => game.totalQuietTime >= 300 },
            { id: 'forest_keeper', icon: '🏆', title: '森林守护者', description: '种下10棵大植物', condition: (game) => game.trees >= 10 },
            { id: 'perfect_silence', icon: '🔇', title: '完美安静', description: '连续保持安静1分钟', condition: (game) => game.longestQuietTime >= 60 },
            { id: 'daily_goal', icon: '✅', title: '每日目标', description: '一天内种下5棵大植物', condition: (game) => game.todayTrees >= 5 },
            { id: 'reading_master', icon: '📚', title: '早读大师', description: '在早读模式下种下3棵大植物', condition: (game) => game.readingTrees >= 3 },
            { id: 'mode_changer', icon: '🔄', title: '模式切换者', description: '在两种模式下都种下植物', condition: (game) => game.bothModesUsed }
        ];

        // DOM元素
        const micBtn = document.getElementById('micBtn');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const resetBtn = document.getElementById('resetBtn');
        const sceneContainer = document.getElementById('sceneContainer');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');
        const saplingCount = document.getElementById('saplingCount');
        const treeCount = document.getElementById('treeCount');
        const quietTime = document.getElementById('quietTime');
        const todayCountEl = document.getElementById('todayCount');
        const noiseLevel = document.getElementById('noiseLevel');
        const noiseIndicator = document.getElementById('noiseIndicator');
        const noiseThreshold = document.getElementById('noiseThreshold');
        const modeText = document.getElementById('modeText');
        const thresholdSlider = document.getElementById('threshold');
        const thresholdValue = document.getElementById('thresholdValue');
        const readingThresholdSlider = document.getElementById('readingThreshold');
        const readingThresholdValue = document.getElementById('readingThresholdValue');
        const historyChart = document.getElementById('historyChart');
        const notification = document.getElementById('notification');
        const settingsPanel = document.getElementById('settingsPanel');
        const achievementsPanel = document.getElementById('achievementsPanel');
        const achievementsList = document.getElementById('achievementsList');
        const settingsToggle = document.getElementById('settingsToggle');
        const achievementsToggle = document.getElementById('achievementsToggle');
        const saplingTimeInput = document.getElementById('saplingTime');
        const saplingTimeValue = document.getElementById('saplingTimeValue');
        const saplingsPerTreeInput = document.getElementById('saplingsPerTree');
        const saplingsPerTreeValue = document.getElementById('saplingsPerTreeValue');
        const enableSoundsInput = document.getElementById('enableSounds');
        // 缓降相关DOM引用移除: decayRateSlider, decayRateValue

        const sceneBtns = document.querySelectorAll('.scene-btn');
        const modeBtns = document.querySelectorAll('.mode-btn');
        const starBg = document.getElementById('starBg');
        const bubbleBg = document.getElementById('bubbleBg');

        // 游戏统计
        let readingTrees = 0;
        let quietTrees = 0;
        let bothModesUsed = false;
        let lastModeUsed = null;

        // 初始化
        loadGameData();
        loadSettings();
        renderScene();
        renderHistoryChart();
        setupAchievements();
        createBackgroundStars();
        createBackgroundBubbles();
        updateModeUI();

        // 事件监听
        micBtn.addEventListener('click', requestMicrophone);
        startBtn.addEventListener('click', startGame);
        stopBtn.addEventListener('click', stopGame);
        resetBtn.addEventListener('click', resetGame);

        // 场景切换
        sceneBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                currentScene = this.dataset.scene;
                updateSceneButtons();
                renderScene();
                saveGameData();
            });
        });

        // 模式切换
        modeBtns.forEach(btn => {
            btn.addEventListener('click', function() {
                currentMode = this.dataset.mode;
                updateModeButtons();
                updateModeUI();
                resetProgress();
                saveGameData();
            });
        });

        // 设置面板切换
        settingsToggle.addEventListener('click', function() {
            togglePanel('settings');
        });

        // 成就面板切换
        achievementsToggle.addEventListener('click', function() {
            togglePanel('achievements');
        });

        // 设置更改
        thresholdSlider.addEventListener('input', function() {
            settings.threshold = parseInt(this.value);
            thresholdValue.textContent = settings.threshold;
            updateThresholdIndicator();
            saveSettings();
        });

        readingThresholdSlider.addEventListener('input', function() {
            settings.readingThreshold = parseInt(this.value);
            readingThresholdValue.textContent = settings.readingThreshold;
            updateThresholdIndicator();
            saveSettings();
        });

        saplingTimeInput.addEventListener('input', function() {
            settings.saplingTime = parseInt(this.value);
            saplingTimeValue.textContent = settings.saplingTime;
            saveSettings();
        });

        saplingsPerTreeInput.addEventListener('input', function() {
            settings.saplingsPerTree = parseInt(this.value);
            saplingsPerTreeValue.textContent = settings.saplingsPerTree;
            saveSettings();
        });

        // 缓降相关事件已移除

        enableSoundsInput.addEventListener('change', function() {
            settings.enableSounds = this.checked;
            saveSettings();
        });

        // 请求麦克风权限
        function requestMicrophone() {
            navigator.mediaDevices.getUserMedia({ audio: true, video: false })
                .then(function() {
                    showNotification('🎤 麦克风权限已获取');
                    micBtn.textContent = '🎤 麦克风已授权';
                    micBtn.disabled = true;
                    startBtn.disabled = false;
                    stopBtn.disabled = false;
                })
                .catch(function(err) {
                    console.error('无法访问麦克风:', err);
                    showNotification('❌ 无法访问麦克风，请确保已授予麦克风权限', true);
                });
        }

        // 开始游戏
        function startGame() {
            if (isRunning) return;

            isRunning = true;
            startBtn.disabled = true;
            stopBtn.disabled = false;

            // 初始化音频上下文
            audioContext = new (window.AudioContext || window.webkitAudioContext)();
            analyser = audioContext.createAnalyser();
            analyser.fftSize = 256;

            // 获取麦克风输入
            navigator.mediaDevices.getUserMedia({ audio: true, video: false })
                .then(function(stream) {
                    microphone = audioContext.createMediaStreamSource(stream);
                    microphone.connect(analyser);

                    scriptProcessor = audioContext.createScriptProcessor(2048, 1, 1);
                    analyser.connect(scriptProcessor);
                    scriptProcessor.connect(audioContext.destination);

                    scriptProcessor.onaudioprocess = function() {
                        if (!isRunning) return;

                        const array = new Uint8Array(analyser.frequencyBinCount);
                        analyser.getByteFrequencyData(array);

                        let values = 0;
                        const length = array.length;
                        for (let i = 0; i < length; i++) {
                            values += array[i];
                        }

                        const average = values / length;
                        const roundedAverage = Math.round(average);
                        noiseLevel.textContent = roundedAverage;

                        // 更新噪音指示器
                        updateNoiseIndicator(roundedAverage);

                        // 根据模式处理逻辑
                        if (currentMode === 'quiet') {
                            handleQuietMode(roundedAverage);
                        } else {
                            handleReadingMode(roundedAverage);
                        }
                    };

                    // 缓降启动逻辑已移除
                })
                .catch(function(err) {
                    console.error('无法访问麦克风:', err);
                    showNotification('❌ 无法访问麦克风，请确保已授予麦克风权限', true);
                    stopGame();
                });
        }

        // 处理安静模式
        function handleQuietMode(average) {
            // 检查是否低于阈值
            if (average < settings.threshold) {
                if (quietStartTime === null) {
                    quietStartTime = Date.now();
                }

                const quietDuration = (Date.now() - quietStartTime) / 1000;
                totalQuietTime += 0.1; // 每100ms增加0.1秒

                // 更新最长安静时间
                if (quietDuration > longestQuietTime) {
                    longestQuietTime = quietDuration;
                }

                quietTime.textContent = quietDuration.toFixed(1) + '秒';

                // 更新进度条
                const progress = Math.min(quietDuration / settings.saplingTime * 100, 100);
                updateProgressBar(progress);

                // 每安静设定时间种一棵小植物
                if (quietDuration >= settings.saplingTime) {
                    addSapling();
                    quietStartTime = Date.now(); // 重置计时
                }
            } else {
                quietStartTime = null;
                updateProgressBar(0);
            }
        }

        // 处理早读模式 (已移除缓降，改为直接归零)
        function handleReadingMode(average) {
            // 检查是否高于阈值
            if (average >= settings.readingThreshold) {
                if (readingStartTime === null) {
                    readingStartTime = Date.now();
                }

                const readingDuration = (Date.now() - readingStartTime) / 1000;

                // 更新进度条 - 超出阈值才开始加分
                const baseProgress = Math.min(readingDuration / settings.saplingTime * 100, 100);
                updateProgressBar(baseProgress);

                // 每达到设定时间种一棵小植物
                if (readingDuration >= settings.saplingTime) {
                    addSapling();
                    readingStartTime = Date.now(); // 重置计时
                }
            } else {
                // 低于阈值：直接归零，没有缓降
                readingStartTime = null;
                updateProgressBar(0);
            }
        }

        // 停止游戏
        function stopGame() {
            isRunning = false;
            startBtn.disabled = false;
            stopBtn.disabled = true;

            if (scriptProcessor) {
                scriptProcessor.disconnect();
                scriptProcessor = null;
            }
            if (analyser) {
                analyser.disconnect();
                analyser = null;
            }
            if (microphone) {
                microphone.disconnect();
                microphone = null;
            }
            if (audioContext) {
                audioContext.close();
                audioContext = null;
            }

            // 缓降定时器已不存在

            quietStartTime = null;
            readingStartTime = null;

            saveGameData();
        }

        // 重置游戏
        function resetGame() {
            if (confirm('确定要重置当前场景吗？所有植物将被清除！')) {
                stopGame();
                saplings = 0;
                trees = 0;
                totalQuietTime = 0;
                todayCount = 0;
                todayTrees = 0;
                longestQuietTime = 0;
                readingTrees = 0;
                quietTrees = 0;
                updateStats();
                sceneContainer.innerHTML = '';
                updateProgressBar(0);

                // 清除本地存储
                localStorage.removeItem(`forestGameData_${currentScene}`);

                saveGameData();
            }
        }

        // 添加小植物
        function addSapling() {
            saplings++;
            todayCount++;

            // 记录模式使用情况
            if (currentMode === 'reading') {
                readingTrees++;
            } else {
                quietTrees++;
            }

            if (lastModeUsed && lastModeUsed !== currentMode) {
                bothModesUsed = true;
            }
            lastModeUsed = currentMode;

            // 检查成就
            checkAchievements();

            if (saplings % settings.saplingsPerTree === 0) {
                // 每设定数量小植物变成一棵大植物
                saplings = 0;
                trees++;
                todayTrees++;
                addTree();
            } else {
                updateStats();
                const sapling = document.createElement('div');
                sapling.className = 'tree sapling';
                sapling.textContent = scenes[currentScene].smallItem;
                sceneContainer.appendChild(sapling);

                // 小动画
                sapling.style.transform = 'scale(0)';
                setTimeout(() => {
                    sapling.style.transform = 'scale(1)';
                }, 10);

                // 特效
                scenes[currentScene].effects.createParticles(sapling);

                // 播放音效
                if (settings.enableSounds) {
                    playSound('sapling');
                }
            }
            saveGameData();
        }

        // 添加大植物
        function addTree() {
            updateStats();

            // 移除多余的小植物
            const saplingElements = document.querySelectorAll('.sapling');
            const count = saplingElements.length;
            for (let i = Math.max(0, count - (settings.saplingsPerTree - 1)); i < count; i++) {
                if (saplingElements[i]) {
                    saplingElements[i].style.transform = 'scale(0)';
                    setTimeout(() => {
                        if (saplingElements[i] && saplingElements[i].parentNode) {
                            saplingElements[i].parentNode.removeChild(saplingElements[i]);
                        }
                    }, 500);
                }
            }

            // 添加大植物
            const tree = document.createElement('div');
            tree.className = 'tree';
            tree.textContent = scenes[currentScene].bigItem;
            sceneContainer.appendChild(tree);

            // 大植物生长动画
            tree.style.transform = 'scale(0)';
            setTimeout(() => {
                tree.style.transform = 'scale(1.5)';
                setTimeout(() => {
                    tree.style.transform = 'scale(1)';
                }, 300);
            }, 10);

            // 特效
            scenes[currentScene].effects.createBigEffect(tree);

            // 庆祝特效
            createConfetti();

            // 播放音效
            if (settings.enableSounds) {
                playSound('tree');
            }

            // 检查成就
            checkAchievements();

            saveGameData();
        }

        // 更新进度条
        function updateProgressBar(progress) {
            progressBar.style.width = progress + '%';
            progressText.textContent = Math.round(progress) + '%';
        }

        // 重置进度
        function resetProgress() {
            updateProgressBar(0);
            quietStartTime = null;
            readingStartTime = null;
        }

        // 更新噪音指示器
        function updateNoiseIndicator(level) {
            const percentage = Math.min(level, 100);
            noiseIndicator.style.left = percentage + '%';
        }

        // 更新阈值指示器
        function updateThresholdIndicator() {
            if (currentMode === 'quiet') {
                noiseThreshold.style.left = settings.threshold + '%';
                noiseThreshold.style.display = 'block';
            } else {
                noiseThreshold.style.left = settings.readingThreshold + '%';
                noiseThreshold.style.display = 'block';
            }
        }

        // 更新模式UI
        function updateModeUI() {
            if (currentMode === 'quiet') {
                modeText.textContent = '(安静模式：低于阈值加分)';
                modeText.style.color = '#4CAF50';
                noiseThreshold.style.left = settings.threshold + '%';
            } else {
                modeText.textContent = '(早读模式：高于阈值加分，低于阈值直接归零)';
                modeText.style.color = '#FF9800';
                noiseThreshold.style.left = settings.readingThreshold + '%';
            }
            updateThresholdIndicator();
        }

        // 更新模式按钮状态
        function updateModeButtons() {
            modeBtns.forEach(btn => {
                if (btn.dataset.mode === currentMode) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }

        // 更新场景按钮状态
        function updateSceneButtons() {
            sceneBtns.forEach(btn => {
                if (btn.dataset.scene === currentScene) {
                    btn.classList.add('active');
                } else {
                    btn.classList.remove('active');
                }
            });
        }

        // 切换面板
        function togglePanel(panel) {
            if (panel === 'settings') {
                const isOpen = settingsPanel.style.display === 'block';
                settingsPanel.style.display = isOpen ? 'none' : 'block';
                if (!isOpen) {
                    achievementsPanel.style.display = 'none';
                }
            } else if (panel === 'achievements') {
                const isOpen = achievementsPanel.style.display === 'block';
                achievementsPanel.style.display = isOpen ? 'none' : 'block';
                if (!isOpen) {
                    settingsPanel.style.display = 'none';
                }
            }
        }

        // 创建星星特效
        function createStar(parent) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 30 - 15 + 'px';
            star.style.top = Math.random() * 30 - 15 + 'px';
            star.style.animationDelay = Math.random() * 2 + 's';
            star.style.width = Math.random() * 4 + 2 + 'px';
            star.style.height = star.style.width;
            parent.appendChild(star);

            setTimeout(() => {
                star.remove();
            }, 2000);
        }

        // 创建泡泡特效
        function createBubble(parent) {
            const bubble = document.createElement('div');
            bubble.className = 'bubble';
            bubble.style.left = Math.random() * 30 - 15 + 'px';
            bubble.style.top = Math.random() * 30 - 15 + 'px';
            bubble.style.width = Math.random() * 20 + 10 + 'px';
            bubble.style.height = bubble.style.width;
            bubble.style.animationDuration = Math.random() * 3 + 2 + 's';
            parent.appendChild(bubble);

            setTimeout(() => {
                bubble.remove();
            }, 5000);
        }

        // 创建火箭特效
        function createRocket(parent) {
            const rocket = document.createElement('div');
            rocket.className = 'rocket';
            rocket.textContent = '🚀';
            rocket.style.position = 'absolute';
            rocket.style.left = '0';
            rocket.style.bottom = '0';
            rocket.style.fontSize = '32px';
            rocket.style.zIndex = '10';
            parent.appendChild(rocket);

            setTimeout(() => {
                rocket.remove();
            }, 3000);
        }

        // 创建树叶特效
        function createLeaf(parent) {
            const leaf = document.createElement('div');
            leaf.className = 'leaf';
            leaf.textContent = '🍃';
            leaf.style.left = Math.random() * 30 - 15 + 'px';
            leaf.style.animationDelay = Math.random() * 2 + 's';
            parent.appendChild(leaf);

            setTimeout(() => {
                leaf.remove();
            }, 3000);
        }

        // 创建闪烁特效
        function createSparkle(parent) {
            const sparkle = document.createElement('div');
            sparkle.className = 'sparkle';
            sparkle.style.left = Math.random() * 30 - 15 + 'px';
            sparkle.style.top = Math.random() * 30 - 15 + 'px';
            parent.appendChild(sparkle);

            setTimeout(() => {
                sparkle.remove();
            }, 1000);
        }

        // 创建彩色纸屑特效
        function createConfetti() {
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 60%)`;
                confetti.style.width = Math.random() * 15 + 5 + 'px';
                confetti.style.height = Math.random() * 15 + 5 + 'px';
                confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '0';
                document.body.appendChild(confetti);

                setTimeout(() => {
                    confetti.remove();
                }, 3000);
            }
        }

        // 创建星空背景
        function createBackgroundStars() {
            for (let i = 0; i < 150; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.left = Math.random() * 100 + 'vw';
                star.style.top = Math.random() * 100 + 'vh';
                star.style.width = Math.random() * 4 + 1 + 'px';
                star.style.height = star.style.width;
                star.style.animationDelay = Math.random() * 5 + 's';
                star.style.animationDuration = Math.random() * 3 + 2 + 's';
                starBg.appendChild(star);
            }
        }

        // 创建泡泡背景
        function createBackgroundBubbles() {
            for (let i = 0; i < 30; i++) {
                const bubble = document.createElement('div');
                bubble.className = 'bubble';
                bubble.style.left = Math.random() * 100 + 'vw';
                bubble.style.bottom = -Math.random() * 100 + 'px';
                bubble.style.width = Math.random() * 30 + 15 + 'px';
                bubble.style.height = bubble.style.width;
                bubble.style.animationDuration = Math.random() * 15 + 10 + 's';
                bubble.style.animationDelay = Math.random() * 5 + 's';
                bubbleBg.appendChild(bubble);
            }
        }

        // 更新统计信息
        function updateStats() {
            saplingCount.textContent = saplings;
            treeCount.textContent = trees;
            quietTime.textContent = longestQuietTime.toFixed(1) + '秒';
            todayCountEl.textContent = todayCount;
        }

        // 保存游戏数据
        function saveGameData() {
            const gameData = {
                saplings: saplings,
                trees: trees,
                totalQuietTime: totalQuietTime,
                todayCount: todayCount,
                todayTrees: todayTrees,
                longestQuietTime: longestQuietTime,
                readingTrees: readingTrees,
                quietTrees: quietTrees,
                bothModesUsed: bothModesUsed,
                lastModeUsed: lastModeUsed,
                sceneContent: sceneContainer.innerHTML,
                lastUpdated: new Date().toISOString().split('T')[0],
                currentScene: currentScene,
                currentMode: currentMode,
                achievements: achievements
            };

            localStorage.setItem(`forestGameData_${currentScene}`, JSON.stringify(gameData));

            // 更新历史数据
            updateHistoryData();
        }

        // 加载游戏数据
        function loadGameData() {
            const savedData = localStorage.getItem(`forestGameData_${currentScene}`);
            if (savedData) {
                const gameData = JSON.parse(savedData);
                const today = new Date().toISOString().split('T')[0];

                // 如果数据是今天的，则加载
                if (gameData.lastUpdated === today) {
                    saplings = gameData.saplings || 0;
                    trees = gameData.trees || 0;
                    totalQuietTime = gameData.totalQuietTime || 0;
                    todayCount = gameData.todayCount || 0;
                    todayTrees = gameData.todayTrees || 0;
                    longestQuietTime = gameData.longestQuietTime || 0;
                    readingTrees = gameData.readingTrees || 0;
                    quietTrees = gameData.quietTrees || 0;
                    bothModesUsed = gameData.bothModesUsed || false;
                    lastModeUsed = gameData.lastModeUsed || null;
                    currentMode = gameData.currentMode || 'quiet';
                    updateStats();

                    // 加载场景内容
                    if (gameData.sceneContent) {
                        sceneContainer.innerHTML = gameData.sceneContent;
                    }
                } else {
                    // 新的一天，重置今日计数
                    todayCount = 0;
                    todayTrees = 0;
                    longestQuietTime = 0;
                    readingTrees = 0;
                    quietTrees = 0;
                    bothModesUsed = false;
                    lastModeUsed = null;
                    updateStats();
                }

                // 加载成就
                if (gameData.achievements) {
                    achievements = gameData.achievements;
                }
            }

            // 加载历史数据
            const savedHistory = localStorage.getItem('forestGameHistory');
            if (savedHistory) {
                historyData = JSON.parse(savedHistory);
            }

            updateModeButtons();
        }

        // 更新历史数据
        function updateHistoryData() {
            const today = new Date().toISOString().split('T')[0];
            let found = false;

            // 查找今天是否已有记录
            for (let i = 0; i < historyData.length; i++) {
                if (historyData[i].date === today) {
                    historyData[i].trees = trees;
                    historyData[i].total = todayCount;
                    historyData[i].scene = currentScene;
                    found = true;
                    break;
                }
            }

            // 如果没有找到今天的记录，添加新记录
            if (!found) {
                historyData.push({
                    date: today,
                    trees: trees,
                    total: todayCount,
                    scene: currentScene
                });
            }

            // 只保留最近7天的数据
            if (historyData.length > 7) {
                historyData = historyData.slice(historyData.length - 7);
            }

            localStorage.setItem('forestGameHistory', JSON.stringify(historyData));
            renderHistoryChart();
        }

        // 渲染场景
        function renderScene() {
            // 更新背景和场景容器
            document.body.className = scenes[currentScene].bgClass;
            sceneContainer.className = `scene-container ${scenes[currentScene].sceneClass}`;

            // 更新进度条颜色
            progressBar.style.background = `linear-gradient(90deg, ${scenes[currentScene].progressColor}, ${scenes[currentScene].progressColor}99)`;

            // 更新按钮颜色
            const buttons = document.querySelectorAll('button:not(.scene-btn):not(.mode-btn)');
            buttons.forEach(btn => {
                btn.style.background = `linear-gradient(145deg, ${scenes[currentScene].buttonColor}, ${scenes[currentScene].buttonColor}cc)`;
            });

            // 显示/隐藏背景元素
            starBg.style.display = currentScene === 'space' ? 'block' : 'none';
            bubbleBg.style.display = currentScene === 'ocean' ? 'block' : 'none';

            // 加载保存的场景内容
            const savedData = localStorage.getItem(`forestGameData_${currentScene}`);
            if (savedData) {
                const gameData = JSON.parse(savedData);
                if (gameData.sceneContent) {
                    sceneContainer.innerHTML = gameData.sceneContent;
                }
            }
        }

        // 显示通知
        function showNotification(message, isError = false) {
            notification.textContent = message;
            if (isError) {
                notification.style.background = 'linear-gradient(145deg, #f44336, #d32f2f)';
            } else {
                notification.style.background = `linear-gradient(145deg, ${scenes[currentScene].buttonColor}, ${scenes[currentScene].buttonColor}cc)`;
            }
            notification.classList.add('show');

            setTimeout(() => {
                notification.classList.remove('show');
            }, 3000);
        }

        // 设置成就系统
        function setupAchievements() {
            // 初始化成就
            achievementConfig.forEach(ach => {
                if (!achievements[ach.id]) {
                    achievements[ach.id] = {
                        unlocked: false,
                        unlockedAt: null
                    };
                }
            });

            renderAchievements();
        }

        // 渲染成就列表
        function renderAchievements() {
            achievementsList.innerHTML = '';

            achievementConfig.forEach(ach => {
                const achievement = document.createElement('div');
                achievement.className = `achievement ${achievements[ach.id].unlocked ? 'unlocked' : 'locked'}`;

                const icon = document.createElement('div');
                icon.className = 'achievement-icon';
                icon.textContent = ach.icon;

                const info = document.createElement('div');
                info.className = 'achievement-info';

                const title = document.createElement('div');
                title.className = 'achievement-title';
                title.textContent = ach.title;

                const desc = document.createElement('div');
                desc.className = 'achievement-description';
                desc.textContent = ach.description;

                info.appendChild(title);
                info.appendChild(desc);

                if (achievements[ach.id].unlocked) {
                    const date = document.createElement('div');
                    date.className = 'achievement-date';
                    date.textContent = `解锁于: ${new Date(achievements[ach.id].unlockedAt).toLocaleDateString()}`;
                    info.appendChild(date);
                }

                achievement.appendChild(icon);
                achievement.appendChild(info);

                achievementsList.appendChild(achievement);
            });
        }

        // 检查成就
        function checkAchievements() {
            const gameState = {
                saplings: saplings,
                trees: trees,
                totalQuietTime: totalQuietTime,
                longestQuietTime: longestQuietTime,
                todayTrees: todayTrees,
                readingTrees: readingTrees,
                quietTrees: quietTrees,
                bothModesUsed: bothModesUsed
            };

            let newAchievements = 0;

            achievementConfig.forEach(ach => {
                if (!achievements[ach.id].unlocked && ach.condition(gameState)) {
                    achievements[ach.id].unlocked = true;
                    achievements[ach.id].unlockedAt = new Date().toISOString();
                    newAchievements++;

                    // 显示成就解锁通知
                    showNotification(`🏆 成就解锁: ${ach.title}`);

                    // 播放音效
                    if (settings.enableSounds) {
                        playSound('achievement');
                    }
                }
            });

            if (newAchievements > 0) {
                renderAchievements();
                saveGameData();
            }
        }

        // 加载设置
        function loadSettings() {
            const savedSettings = localStorage.getItem('forestGameSettings');
            if (savedSettings) {
                const loadedSettings = JSON.parse(savedSettings);
                settings.threshold = loadedSettings.threshold || 30;
                settings.readingThreshold = loadedSettings.readingThreshold || 50;
                settings.saplingTime = loadedSettings.saplingTime || 5;
                settings.saplingsPerTree = loadedSettings.saplingsPerTree || 10;
                settings.enableSounds = loadedSettings.enableSounds !== false;
                // decayRate 已忽略
            }

            // 更新UI
            thresholdSlider.value = settings.threshold;
            thresholdValue.textContent = settings.threshold;
            readingThresholdSlider.value = settings.readingThreshold;
            readingThresholdValue.textContent = settings.readingThreshold;
            saplingTimeInput.value = settings.saplingTime;
            saplingTimeValue.textContent = settings.saplingTime;
            saplingsPerTreeInput.value = settings.saplingsPerTree;
            saplingsPerTreeValue.textContent = settings.saplingsPerTree;
            enableSoundsInput.checked = settings.enableSounds;
            // 缓降相关DOM已不存在
        }

        // 保存设置
        function saveSettings() {
            localStorage.setItem('forestGameSettings', JSON.stringify(settings));
        }

        // 渲染历史图表
        function renderHistoryChart() {
            historyChart.innerHTML = '<h3 style="margin-top: 0;">历史记录 (最近7天)</h3>';

            // 确保有数据
            if (historyData.length === 0) {
                historyChart.innerHTML += '<p style="text-align: center; color: #666; padding: 50px 0;">暂无历史记录</p>';
                return;
            }

            // 找出最大值用于缩放
            const maxTotal = Math.max(...historyData.map(item => item.total), 10);
            const chartHeight = 120;
            const barWidth = 40;
            const gap = (historyChart.clientWidth - 40 - (historyData.length * barWidth)) / (historyData.length - 1);
            const startX = 20;

            // 创建图表条
            historyData.forEach((item, index) => {
                const barHeight = (item.total / maxTotal) * chartHeight;
                const bar = document.createElement('div');
                bar.className = 'chart-bar';
                bar.style.left = startX + index * (barWidth + gap) + 'px';
                bar.style.height = barHeight + 'px';

                // 添加标签
                const label = document.createElement('div');
                label.className = 'chart-label';
                const dateParts = item.date.split('-');
                label.textContent = `${dateParts[1]}/${dateParts[2]}\n${item.total}`;

                bar.appendChild(label);
                historyChart.appendChild(bar);
            });
        }

        // 播放音效
        function playSound(type) {
            if (!settings.enableSounds) return;

            try {
                const audioContext = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioContext.createOscillator();
                const gainNode = audioContext.createGain();

                oscillator.connect(gainNode);
                gainNode.connect(audioContext.destination);

                switch (type) {
                    case 'sapling':
                        oscillator.frequency.value = 800;
                        gainNode.gain.value = 0.1;
                        oscillator.type = 'sine';
                        break;
                    case 'tree':
                        oscillator.frequency.value = 600;
                        gainNode.gain.value = 0.2;
                        oscillator.type = 'triangle';
                        break;
                    case 'achievement':
                        oscillator.frequency.value = 1000;
                        gainNode.gain.value = 0.3;
                        oscillator.type = 'sawtooth';
                        break;
                    default:
                        oscillator.frequency.value = 440;
                        gainNode.gain.value = 0.1;
                        oscillator.type = 'sine';
                }

                oscillator.start();
                gainNode.gain.exponentialRampToValueAtTime(0.001, audioContext.currentTime + 0.5);
                oscillator.stop(audioContext.currentTime + 0.5);
            } catch (e) {
                console.log('音效播放失败:', e);
            }
        }
    </script>
