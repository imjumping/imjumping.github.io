<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0;
            padding: 0;
        }

        body {
            background: transparent;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        @keyframes FlyIn {
            0% {
                transform: scale(60%);
                opacity: 0;
            }

            100% {
                transform: none;
                opacity: 1;
            }
        }

        .shadow-only {
            animation: FlyIn 0.37s ease;
            border-radius: 30px;
            width: 300px;
            height: 200px;
            background-color: #ffffff00;
            box-shadow: 0 15px 20px rgba(0, 0, 0, 0.3);
            pointer-events: none;
            position: relative;
        }

        .glass-icon {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 36px;
            height: 36px;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(3px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.14);
            pointer-events: none;
        }
    </style>
</head>

<body>
    <div class="shadow-only">
        <div class="glass-icon">⚙️</div>
    </div>
</body>

</html>
